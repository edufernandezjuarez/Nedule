<!doctype html>
<html>
  <head>
    <title>Nedule</title>
    <link rel="stylesheet" href="/css/inicio.css" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <h1 class="login-title">Nedule</h1>
        <input
          type="text"
          id="usernameInput"
          class="login-input"
          placeholder="Username"
          onkeydown="if (event.key === 'Enter') submitLogin();"
        />
        <input
          type="password"
          id="passwordInput"
          class="login-input"
          placeholder="Password"
          onkeydown="if (event.key === 'Enter') submitLogin();"
        />
        <p class="login-error hidden" id="loginError">Invalid username or password</p>
        <button class="login-submit" onclick="submitLogin()">Enter</button>
      </div>
    </div>
    <script src="/js/login.js"></script>
  </body>
</html>
