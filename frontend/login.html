<!doctype html>
<html>
  <head>
    <title>Nedule</title>
    <link rel="stylesheet" href="/css/inicio.css" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <h1 class="login-title">Nedule</h1>
        <p class="login-subtitle">Who are you?</p>

        <div class="login-users">
          <button class="login-user-btn" onclick="selectUser('Edu')">
            <div class="login-avatar">E</div>
            <span>Edu</span>
          </button>
          <button class="login-user-btn" onclick="selectUser('Nicole')">
            <div class="login-avatar">N</div>
            <span>Nicole</span>
          </button>
        </div>

        <div class="login-password-section hidden" id="passwordSection">
          <p class="login-for" id="loginFor"></p>
          <input
            type="password"
            id="passwordInput"
            class="login-input"
            placeholder="Password"
            onkeydown="if (event.key === 'Enter') submitLogin();"
          />
          <button class="login-submit" onclick="submitLogin()">Enter</button>
        </div>
      </div>
    </div>

    <script src="/js/login.js"></script>
  </body>
</html>
