<!doctype html>
<!--1502-->
<html>
  <head>
    <title>Nedule</title>
    <link rel="stylesheet" href="/css/inicio.css" />
    <script>
      const user = localStorage.getItem("activeUser");
      if (!user) window.location.href = "/login.html";
    </script>
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-links">
        <button class="nav-btn" data-page="lists">Lists</button>
        <button class="nav-btn" data-page="imdb">IMDB</button>
        <button class="nav-btn" data-page="swipe">Swipe</button>
      </div>
      <div
        class="user-wrapper"
        style="display: flex; align-items: center; gap: 8px"
      >
        <div class="info-wrapper">
          <button class="btn-info" id="infoBtn" onclick="toggleInfoMenu()">
            Info
          </button>
          <div class="info-menu hidden" id="infoMenu">
            <button onclick="goToReviews()">Review history</button>
          </div>
        </div>
        <button class="user-badge" id="userBadge" onclick="toggleMenu()">
          <div class="avatar" id="avatarInitial">E</div>
          <span class="username" id="usernameLabel">Edu</span>
        </button>
        <div class="user-menu" id="userMenu">
          <button class="user-option" onclick="selectUser('Edu', 'E')">
            Edu
          </button>
          <button class="user-option" onclick="selectUser('Nicole', 'N')">
            Nicole
          </button>
        </div>
      </div>
    </nav>
    <nav class="mobile-nav" id="mobileNav">
      <button
        class="mobile-nav-btn"
        onclick="window.location.href = '/inicio.html'"
      >
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Home
      </button>
      <button class="mobile-nav-btn" id="mobileSwipeBtn">
        <svg viewBox="0 0 24 24">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
          />
        </svg>
        Swipe
      </button>
      <button class="mobile-nav-btn imdb-btn" id="mobileImdbBtn">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        IMDB
      </button>
      <button class="mobile-nav-btn active" id="mobileListsBtn">
        <svg viewBox="0 0 24 24">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
        Lists
      </button>
      <button
        class="mobile-nav-btn"
        id="mobileUserBtn"
        onclick="toggleMobileUserMenu()"
      >
        <div
          class="avatar"
          id="mobileAvatar"
          style="width: 28px; height: 28px; font-size: 12px"
        >
          E
        </div>
        <span id="mobileUsername">Edu</span>
      </button>
    </nav>

    <div class="mobile-user-menu hidden" id="mobileUserMenu">
      <button
        class="mobile-user-menu-item"
        id="mobileUserEdu"
        onclick="selectMobileUser('Edu')"
      >
        <div class="avatar" style="width: 24px; height: 24px; font-size: 10px">
          E
        </div>
        Edu
      </button>
      <button
        class="mobile-user-menu-item"
        id="mobileUserNicole"
        onclick="selectMobileUser('Nicole')"
      >
        <div class="avatar" style="width: 24px; height: 24px; font-size: 10px">
          N
        </div>
        Nicole
      </button>
      <hr class="mobile-user-menu-divider" />
      <button
        class="mobile-user-menu-item"
        onclick="window.location.href = '/reviews.html'"
      >
        📋 Review history
      </button>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/user-menu.js"></script>
  </body>
</html>
