<!doctype html>
<html>
  <head>
    <title>Swipe — Nedule</title>
    <link rel="stylesheet" href="/css/inicio.css" />
    <link rel="stylesheet" href="/css/imdb.css" />
    <link rel="stylesheet" href="/css/swipe.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-links">
        <button class="nav-btn" data-page="lists">Lists</button>
        <button class="nav-btn" data-page="imdb">IMDB</button>
        <button class="nav-btn active" data-page="swipe">Swipe</button>
      </div>
      <div
        class="user-wrapper"
        style="display: flex; align-items: center; gap: 8px"
      >
        <div class="info-wrapper">
          <button class="btn-info" id="infoBtn" onclick="toggleInfoMenu()">
            Info
          </button>
          <div class="info-menu hidden" id="infoMenu">
            <button onclick="goToReviews()">Review history</button>
          </div>
        </div>
        <button class="user-badge" id="userBadge" onclick="toggleMenu()">
          <div class="avatar" id="avatarInitial">E</div>
          <span class="username" id="usernameLabel">Edu</span>
        </button>
        <div class="user-menu" id="userMenu">
          <button class="user-option" onclick="selectUser('Edu', 'E')">
            Edu
          </button>
          <button class="user-option" onclick="selectUser('Nicole', 'N')">
            Nicole
          </button>
        </div>
      </div>
    </nav>

    <main class="swipe-layout">
      <!-- Filtros -->
      <aside class="swipe-filters">
        <h3 class="swipe-filters-title">Filters</h3>

        <div class="filter-section">
          <label class="filter-label">Type</label>
          <div class="filter-type-row">
            <button
              class="type-btn active"
              id="typeAll"
              onclick="setType('all')"
            >
              All
            </button>
            <button class="type-btn" id="typeMovie" onclick="setType('movie')">
              Movies
            </button>
            <button class="type-btn" id="typeTv" onclick="setType('tv')">
              Series
            </button>
          </div>
        </div>

        <div class="filter-section">
          <label class="filter-label">Year range</label>
          <div class="filter-year-display">
            <span id="yearMinDisplay">1900</span> —
            <span id="yearMaxDisplay">2026</span>
          </div>
          <div class="filter-slider-row">
            <input
              type="range"
              id="yearMin"
              min="1900"
              max="2026"
              value="1900"
              step="1"
              oninput="updateYearFilter()"
            />
          </div>
          <div class="filter-slider-row">
            <input
              type="range"
              id="yearMax"
              min="1900"
              max="2026"
              value="2026"
              step="1"
              oninput="updateYearFilter()"
            />
          </div>
        </div>

        <div class="filter-section">
          <label class="filter-label">Genres</label>
          <div class="genre-chips" id="genreChips"></div>
        </div>
      </aside>

      <!-- Card -->
      <div class="swipe-center">
        <div class="swipe-card clickable" id="swipeCard">
          <div class="swipe-poster-wrap">
            <img class="swipe-poster" id="swipePoster" src="" alt="" />
          </div>
          <div class="swipe-info">
            <div class="swipe-title" id="swipeTitle"></div>
            <div class="swipe-meta" id="swipeMeta"></div>
            <div class="swipe-overview" id="swipeOverview"></div>
          </div>
        </div>
        <div class="swipe-actions">
          <button
            class="swipe-btn swipe-add"
            onclick="openAddModal(currentSwipe)"
          >
            + Add to list
          </button>
          <button class="swipe-btn swipe-next" onclick="loadSwipe()">
            Next →
          </button>
        </div>
      </div>
    </main>
    <!-- Mobile swipe layout -->
    <div class="swipe-mobile" id="swipeMobile">
      <button class="swipe-mobile-filters-btn" onclick="toggleMobileFilters()">
        FILTERS
      </button>
      <div class="swipe-mobile-card" id="swipeMobileCard">
        <img id="swipeMobilePoster" src="" alt="" />
        <div class="swipe-mobile-card-info">
          <div class="swipe-mobile-card-title" id="swipeMobileTitle"></div>
          <div class="swipe-mobile-card-meta" id="swipeMobileMeta"></div>
        </div>
      </div>
      <div class="swipe-mobile-actions">
        <button class="swipe-mobile-next" onclick="loadSwipe()">Next</button>
        <button class="swipe-mobile-add" onclick="openAddModal(currentSwipe)">
          ADD
        </button>
      </div>
    </div>

    <!-- Mobile filters modal -->
    <div class="swipe-mobile-filters-modal hidden" id="swipeMobileFiltersModal">
      <div class="swipe-mobile-filters-content">
        <div class="swipe-mobile-filters-header">
          <h3>Filters</h3>
          <button
            class="swipe-mobile-filters-close"
            onclick="toggleMobileFilters()"
          >
            ✕
          </button>
        </div>
        <div class="filter-section">
          <label class="filter-label">Type</label>
          <div class="filter-type-row">
            <button
              class="type-btn active"
              id="mobileTypeAll"
              onclick="setType('all')"
            >
              All
            </button>
            <button
              class="type-btn"
              id="mobileTypeMovie"
              onclick="setType('movie')"
            >
              Movies
            </button>
            <button class="type-btn" id="mobileTypeTv" onclick="setType('tv')">
              Series
            </button>
          </div>
        </div>
        <div class="filter-section">
          <label class="filter-label">Year range</label>
          <div class="filter-year-display">
            <span id="mobileYearMinDisplay">1900</span> —
            <span id="mobileYearMaxDisplay">2026</span>
          </div>
          <div class="filter-slider-row">
            <input
              type="range"
              id="mobileYearMin"
              min="1900"
              max="2026"
              value="1900"
              step="1"
              oninput="updateMobileYearFilter()"
            />
          </div>
          <div class="filter-slider-row">
            <input
              type="range"
              id="mobileYearMax"
              min="1900"
              max="2026"
              value="2026"
              step="1"
              oninput="updateMobileYearFilter()"
            />
          </div>
        </div>
        <div class="filter-section">
          <label class="filter-label">Genres</label>
          <div class="genre-chips" id="mobileGenreChips"></div>
        </div>
        <div class="filter-actions">
          <button onclick="clearMobileFilters()">Clear</button>
          <button class="btn-primary" onclick="applyMobileFilters()">
            Apply
          </button>
        </div>
      </div>
    </div>
    <!-- Modal agregar a lista -->
    <div class="modal-overlay hidden" id="addToListModal">
      <div class="modal">
        <h3>Add to list</h3>
        <div id="modalListOptions"></div>
        <div class="modal-actions">
          <button onclick="closeAddModal()">Cancel</button>
        </div>
      </div>
    </div>
    <nav class="mobile-nav" id="mobileNav">
      <button
        class="mobile-nav-btn"
        onclick="window.location.href = '/inicio.html'"
      >
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Home
      </button>
      <button class="mobile-nav-btn active" id="mobileSwipeBtn">
        <svg viewBox="0 0 24 24">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
          />
        </svg>
        Swipe
      </button>
      <button class="mobile-nav-btn imdb-btn" id="mobileImdbBtn">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        IMDB
      </button>
      <button class="mobile-nav-btn" id="mobileListsBtn">
        <svg viewBox="0 0 24 24">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
        Lists
      </button>
      <button
        class="mobile-nav-btn"
        id="mobileUserBtn"
        onclick="toggleMobileUserMenu()"
      >
        <div
          class="avatar"
          id="mobileAvatar"
          style="width: 28px; height: 28px; font-size: 12px"
        >
          E
        </div>
        <span id="mobileUsername">Edu</span>
      </button>
    </nav>

    <div class="mobile-user-menu hidden" id="mobileUserMenu">
      <button
        class="mobile-user-menu-item"
        id="mobileUserEdu"
        onclick="selectMobileUser('Edu')"
      >
        <div class="avatar" style="width: 24px; height: 24px; font-size: 10px">
          E
        </div>
        Edu
      </button>
      <button
        class="mobile-user-menu-item"
        id="mobileUserNicole"
        onclick="selectMobileUser('Nicole')"
      >
        <div class="avatar" style="width: 24px; height: 24px; font-size: 10px">
          N
        </div>
        Nicole
      </button>
      <hr class="mobile-user-menu-divider" />
      <button
        class="mobile-user-menu-item"
        onclick="window.location.href = '/reviews.html'"
      >
        📋 Review history
      </button>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/user-menu.js"></script>
    <script src="/js/swipe.js"></script>
  </body>
</html>
