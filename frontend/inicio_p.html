<!doctype html>
<html>
  <head>
    <title>Nedule</title>
    <link rel="stylesheet" href="/css/inicio.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-links">
        <button class="nav-btn logo">❤️ Nedule</button>
      </div>
      <div class="user-wrapper" style="display: flex; align-items: center; gap: 8px">
        <button class="user-badge" id="userBadge" onclick="toggleMenu()">
          <div class="avatar" id="avatarInitial">E</div>
          <span class="username" id="usernameLabel">Edu</span>
        </button>
        <div class="user-menu" id="userMenu">
          <button class="user-option" onclick="goToProfile()">
            <div class="avatar">E</div>
            <span>Edu</span>
          </button>
          <hr class="user-menu-divider" />
          <button class="user-option user-option-logout" onclick="logout()">Log out</button>
        </div>
      </div>
    </nav>
    <main class="page">
      <div class="index-wrapper">
        <button class="index-card" onclick="window.location.href = '/inicio.html'">🎬 Pelis</button>
        <button class="index-card" onclick="window.location.href = '/inicio_j.html'">🎮 Juegos</button>
        <button class="index-card" onclick="window.location.href = '/inicio_p.html'">🏠 Casa</button>
      </div>
    </main>
    <script src="/js/auth.js"></script>
    <script src="/js/user-menu.js"></script>
  </body>
</html>
