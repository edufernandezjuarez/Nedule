<!doctype html>
<html>
  <head>
    <title>IMDB — Nedule</title>
    <link rel="stylesheet" href="/css/inicio.css" />
    <link rel="stylesheet" href="/css/imdb.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-links">
        <button class="nav-btn" data-page="lists">Lists</button>
        <button class="nav-btn active" data-page="imdb">IMDB</button>
      </div>
      <div class="user-wrapper">
        <button class="user-badge" id="userBadge" onclick="toggleMenu()">
          <div class="avatar" id="avatarInitial">N</div>
          <span class="username" id="usernameLabel">Nicole</span>
        </button>
        <div class="user-menu" id="userMenu">
          <button class="user-option" onclick="selectUser('Edu', 'E')">
            Edu
          </button>
          <button class="user-option" onclick="selectUser('Nicole', 'N')">
            Nicole
          </button>
        </div>
      </div>
    </nav>

    <main class="page" id="imdbView">
      <div class="page-header">
        <h2 class="page-title">Search</h2>
      </div>
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search for a movie or series..."
        />
        <div class="filter-wrapper">
          <button
            class="btn-filter"
            id="filterBtn"
            onclick="toggleFilterMenu()"
          >
            Filter
          </button>
          <div class="filter-menu hidden" id="filterMenu">
            <div class="filter-section">
              <label class="filter-label">Year range</label>
              <div class="filter-year-display">
                <span id="yearMinDisplay">1900</span> —
                <span id="yearMaxDisplay">2026</span>
              </div>
              <div class="filter-slider-row">
                <input
                  type="range"
                  id="yearMin"
                  min="1900"
                  max="2026"
                  value="1900"
                  step="1"
                  oninput="updateYearFilter()"
                />
              </div>
              <div class="filter-slider-row">
                <input
                  type="range"
                  id="yearMax"
                  min="1900"
                  max="2026"
                  value="2026"
                  step="1"
                  oninput="updateYearFilter()"
                />
              </div>
            </div>
            <div class="filter-actions">
              <button onclick="clearFilters()">Clear</button>
              <button class="btn-primary" onclick="applyFilters()">
                Apply
              </button>
            </div>
          </div>
        </div>
        <button onclick="searchMovies()">Search</button>
      </div>
      <div class="search-results hidden" id="searchResults"></div>
      <!-- Modal elegir lista -->
      <div class="modal-overlay hidden" id="addToListModal">
        <div class="modal">
          <h3>Add to list</h3>
          <div id="modalListOptions"></div>
          <div class="modal-actions">
            <button onclick="closeAddModal()">Cancel</button>
          </div>
        </div>
      </div>
    </main>
    <script>
      localStorage.setItem("activeUser", "Nicole");
    </script>
    <script src="/js/user-menu.js"></script>
    <script src="/js/imdb.js"></script>
  </body>
</html>
