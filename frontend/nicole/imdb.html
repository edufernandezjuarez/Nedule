<!doctype html>
<html>
  <head>
    <title>IMDB — Nedule</title>
    <link rel="stylesheet" href="/css/inicio.css" />
    <link rel="stylesheet" href="/css/imdb.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-links">
        <button class="nav-btn logo" onclick="window.location.href = '/inicio.html'">❤️ Nedule</button>
        <button class="nav-btn" data-page="lists">Lists</button>
        <button class="nav-btn active" data-page="imdb">TMDB</button>
        <button class="nav-btn" data-page="swipe">Swipe</button>
      </div>
      <div class="user-wrapper" style="display: flex; align-items: center; gap: 8px">
        <div class="info-wrapper">
          <button class="btn-info" id="infoBtn" onclick="toggleInfoMenu()">Info</button>
          <div class="info-menu hidden" id="infoMenu">
            <button onclick="goToReviews()">Review history</button>
            <button onclick="goToHidden()">Hidden titles</button>
          </div>
        </div>
        <button class="user-badge" id="userBadge" onclick="toggleMenu()">
          <div class="avatar" id="avatarInitial">E</div>
          <span class="username" id="usernameLabel">Edu</span>
        </button>
        <div class="user-menu" id="userMenu">
          <button class="user-option" onclick="selectUser('Edu', 'E')">Edu</button>
          <button class="user-option" onclick="selectUser('Nicole', 'N')">Nicole</button>
        </div>
      </div>
    </nav>

    <main class="page" id="imdbView">
      <div class="page-header">
        <h2 class="page-title">Search</h2>
        <button class="btn-new" onclick="window.location.href = '/cast.html'">Cast & Directors</button>
      </div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search for a movie or series..." />
        <div class="filter-wrapper">
          <button class="btn-filter" id="filterBtn" onclick="toggleFilterMenu()">Filter</button>
          <div class="filter-menu hidden" id="filterMenu">
            <label class="filter-label">Type</label>
            <div class="filter-type-row">
              <button class="type-btn active" id="typeAll" onclick="setType('all')">All</button>
              <button class="type-btn" id="typeMovie" onclick="setType('movie')">Movies</button>
              <button class="type-btn" id="typeTv" onclick="setType('tv')">Series</button>
            </div>
            <div class="filter-section">
              <label class="filter-label">Year range</label>
              <div class="filter-year-display">
                <span id="yearMinDisplay">1900</span> —
                <span id="yearMaxDisplay">2026</span>
              </div>
              <div class="filter-slider-row">
                <input
                  type="range"
                  id="yearMin"
                  min="1900"
                  max="2026"
                  value="1900"
                  step="1"
                  oninput="updateYearFilter()"
                />
              </div>
              <div class="filter-slider-row">
                <input
                  type="range"
                  id="yearMax"
                  min="1900"
                  max="2026"
                  value="2026"
                  step="1"
                  oninput="updateYearFilter()"
                />
              </div>
            </div>
            <div class="filter-section">
              <label class="filter-label">Genre</label>
              <div class="genre-chips" id="genreChips"></div>
            </div>
            <div class="filter-section">
              <label class="filter-label">Region</label>
              <div class="continent-chips" id="continentChips">
                <button class="continent-chip" onclick="toggleContinent(this, 'northamerica')">North America</button>
                <button class="continent-chip" onclick="toggleContinent(this, 'southamerica')">South America</button>
                <button class="continent-chip" onclick="toggleContinent(this, 'europe')">Europe</button>
                <button class="continent-chip" onclick="toggleContinent(this, 'asia')">Asia</button>
                <button class="continent-chip" onclick="toggleContinent(this, 'middleeast')">Middle East</button>
                <button class="continent-chip" onclick="toggleContinent(this, 'africa')">Africa</button>
                <button class="continent-chip" onclick="toggleContinent(this, 'oceania')">Oceania</button>
              </div>
              <input
                type="text"
                id="countryInput"
                class="filter-select"
                placeholder="Specific country (e.g. Argentina)"
                style="margin-top: 8px"
                oninput="activeFilters.countryName = this.value"
              />
            </div>
            <div class="filter-actions">
              <button onclick="clearFilters()">Clear</button>
              <button class="btn-primary" onclick="applyFilters()">Apply</button>
            </div>
          </div>
        </div>
        <button onclick="searchMovies()">Search</button>
      </div>
      <!-- Bottom sheet mobile -->
      <div class="mobile-bottom-sheet-overlay hidden" id="filterOverlay" onclick="closeFilterSheet()"></div>
      <div class="mobile-bottom-sheet hidden" id="filterSheet">
        <div class="mobile-bottom-sheet-handle"></div>
        <div class="mobile-bottom-sheet-header">
          <h3>Filters</h3>
          <button onclick="closeFilterSheet()">✕</button>
        </div>
        <div class="mobile-bottom-sheet-content">
          <div class="filter-section">
            <label class="filter-label">Type</label>
            <div class="filter-type-row">
              <button class="type-btn active" id="sheetTypeAll" onclick="setType('all')">All</button>
              <button class="type-btn" id="sheetTypeMovie" onclick="setType('movie')">Movies</button>
              <button class="type-btn" id="sheetTypeTv" onclick="setType('tv')">Series</button>
            </div>
          </div>
          <div class="filter-section">
            <label class="filter-label">Year range</label>
            <div class="filter-year-display">
              <span id="sheetYearMinDisplay">1900</span> — <span id="sheetYearMaxDisplay">2026</span>
            </div>
            <div class="filter-slider-row">
              <input
                type="range"
                id="sheetYearMin"
                min="1900"
                max="2026"
                value="1900"
                step="1"
                oninput="updateSheetYearFilter()"
              />
            </div>
            <div class="filter-slider-row">
              <input
                type="range"
                id="sheetYearMax"
                min="1900"
                max="2026"
                value="2026"
                step="1"
                oninput="updateSheetYearFilter()"
              />
            </div>
          </div>
          <div class="filter-section">
            <label class="filter-label">Genre</label>
            <div class="genre-chips" id="sheetGenreChips"></div>
          </div>
          <div class="filter-section">
            <label class="filter-label">Region</label>
            <div class="continent-chips" id="sheetContinentChips">
              <button class="continent-chip" onclick="toggleSheetContinent(this, 'northamerica')">North America</button>
              <button class="continent-chip" onclick="toggleSheetContinent(this, 'southamerica')">South America</button>
              <button class="continent-chip" onclick="toggleSheetContinent(this, 'europe')">Europe</button>
              <button class="continent-chip" onclick="toggleSheetContinent(this, 'asia')">Asia</button>
              <button class="continent-chip" onclick="toggleSheetContinent(this, 'middleeast')">Middle East</button>
              <button class="continent-chip" onclick="toggleSheetContinent(this, 'africa')">Africa</button>
              <button class="continent-chip" onclick="toggleSheetContinent(this, 'oceania')">Oceania</button>
            </div>
            <input
              type="text"
              id="sheetCountryInput"
              class="filter-select"
              placeholder="Specific country..."
              style="margin-top: 8px"
              oninput="activeFilters.countryName = this.value"
            />
          </div>
          <div class="filter-actions">
            <button onclick="clearSheetFilters()">Clear</button>
            <button class="btn-primary" onclick="applySheetFilters()">Apply</button>
          </div>
        </div>
      </div>
      <div class="search-results hidden" id="searchResults"></div>
      <!-- Modal elegir lista -->
      <div class="modal-overlay hidden" id="addToListModal">
        <div class="modal">
          <h3>Add to list</h3>
          <div id="modalListOptions"></div>
          <div class="modal-actions">
            <button onclick="closeAddModal()">Cancel</button>
          </div>
        </div>
      </div>
    </main>
    <nav class="mobile-nav" id="mobileNav">
      <button class="mobile-nav-btn" onclick="window.location.href = '/inicio.html'">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Home
      </button>
      <button class="mobile-nav-btn" id="mobileSwipeBtn">
        <svg viewBox="0 0 24 24">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
          />
        </svg>
        Swipe
      </button>
      <button class="mobile-nav-btn imdb-btn active" id="mobileImdbBtn">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        IMDB
      </button>
      <button class="mobile-nav-btn" id="mobileListsBtn">
        <svg viewBox="0 0 24 24">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
        Lists
      </button>
      <button class="mobile-nav-btn" id="mobileUserBtn" onclick="toggleMobileUserMenu()">
        <div class="avatar" id="mobileAvatar" style="width: 28px; height: 28px; font-size: 12px">E</div>
        <span id="mobileUsername">Edu</span>
      </button>
    </nav>

    <div class="mobile-user-menu hidden" id="mobileUserMenu">
      <button class="mobile-user-menu-item" id="mobileUserEdu" onclick="selectMobileUser('Edu')">
        <div class="avatar" style="width: 24px; height: 24px; font-size: 10px">E</div>
        Edu
      </button>
      <button class="mobile-user-menu-item" id="mobileUserNicole" onclick="selectMobileUser('Nicole')">
        <div class="avatar" style="width: 24px; height: 24px; font-size: 10px">N</div>
        Nicole
      </button>
      <hr class="mobile-user-menu-divider" />
      <button class="mobile-user-menu-item" onclick="window.location.href = '/reviews.html'">📋 Review history</button>
      <button class="mobile-user-menu-item" onclick="window.location.href = '/hidden.html'">🚫 Hidden titles</button>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/user-menu.js"></script>
    <script>
      localStorage.setItem("activeUser", "Nicole");
    </script>
    <script src="/js/user-menu.js"></script>
    <script src="/js/imdb.js"></script>
  </body>
</html>
